<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>じゃんけんゲーム</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- タイトル画面 -->
    <section id="title-screen" class="screen active">
    <h1 class="main-title">じゃんけん<br>ゲーム</h1>
      <button id="start-btn" class="big-button">スタート</button>
    </section>

    <!-- ゲーム画面 -->
    <section id="game-screen" class="screen">
      <h2 class="sub-title">あなたの手をえらんでね</h2>

      <div class="cpu-area">
        <div id="cpu-hand" class="hand-emoji">✊</div>
        <p class="cpu-text">あいての手</p>
      </div>

      <div class="choice-buttons">
        <button class="choice-btn" data-hand="グー">
          <span class="choice-emoji">✊</span>
          <span class="choice-text">グー</span>
        </button>

        <button class="choice-btn" data-hand="チョキ">
          <span class="choice-emoji">✌️</span>
          <span class="choice-text">チョキ</span>
        </button>

        <button class="choice-btn" data-hand="パー">
          <span class="choice-emoji">✋</span>
          <span class="choice-text">パー</span>
        </button>
      </div>
    </section>

    <!-- 結果画面 -->
    <section id="result-screen" class="screen">
      <h2 id="result-text" class="result-text">勝ち！</h2>

      <div class="result-hands">
        <div class="result-box">
          <p class="result-label">あいて</p>
          <div id="result-cpu" class="result-emoji">✊</div>
          <p id="result-cpu-name" class="result-name">グー</p>
        </div>

        <div class="result-box">
          <p class="result-label">あなた</p>
          <div id="result-player" class="result-emoji">✋</div>
          <p id="result-player-name" class="result-name">パー</p>
        </div>
      </div>

      <div class="result-buttons">
        <button id="retry-btn" class="big-button">もう一度する</button>
        <button id="back-title-btn" class="big-button secondary">タイトルに戻る</button>
      </div>
    </section>

  </div>

  <script>
    const titleScreen = document.getElementById("title-screen");
    const gameScreen = document.getElementById("game-screen");
    const resultScreen = document.getElementById("result-screen");

    const startBtn = document.getElementById("start-btn");
    const retryBtn = document.getElementById("retry-btn");
    const backTitleBtn = document.getElementById("back-title-btn");

    const cpuHand = document.getElementById("cpu-hand");
    const resultText = document.getElementById("result-text");
    const resultCpu = document.getElementById("result-cpu");
    const resultPlayer = document.getElementById("result-player");
    const resultCpuName = document.getElementById("result-cpu-name");
    const resultPlayerName = document.getElementById("result-player-name");

    const choiceButtons = document.querySelectorAll(".choice-btn");

    const hands = [
      { name: "グー", emoji: "✊" },
      { name: "チョキ", emoji: "✌️" },
      { name: "パー", emoji: "✋" }
    ];

    function showScreen(screenToShow) {
      titleScreen.classList.remove("active");
      gameScreen.classList.remove("active");
      resultScreen.classList.remove("active");
      screenToShow.classList.add("active");
    }

    function getRandomHand() {
      const index = Math.floor(Math.random() * hands.length);
      return hands[index];
    }

    function judge(player, cpu) {
      if (player.name === cpu.name) {
        return "あいこ！";
      }

      if (
        (player.name === "グー" && cpu.name === "チョキ") ||
        (player.name === "チョキ" && cpu.name === "パー") ||
        (player.name === "パー" && cpu.name === "グー")
      ) {
        return "勝ち！";
      }

      return "負け…";
    }

    function startGame() {
      const cpu = getRandomHand();
      cpuHand.textContent = cpu.emoji;
      cpuHand.dataset.name = cpu.name;
      showScreen(gameScreen);
    }

    startBtn.addEventListener("click", startGame);
    retryBtn.addEventListener("click", startGame);

    backTitleBtn.addEventListener("click", () => {
      showScreen(titleScreen);
    });

    choiceButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const playerName = button.dataset.hand;
        const player = hands.find(hand => hand.name === playerName);

        const cpu = {
          name: cpuHand.dataset.name,
          emoji: cpuHand.textContent
        };

        const result = judge(player, cpu);

        resultText.textContent = result;
        resultCpu.textContent = cpu.emoji;
        resultPlayer.textContent = player.emoji;
        resultCpuName.textContent = cpu.name;
        resultPlayerName.textContent = player.name;

        showScreen(resultScreen);
      });
    });
  </script>
</body>
</html>
